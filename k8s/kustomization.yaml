apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Manifests applied by Flux for the production deployment. Local-dev
# helpers (LocalStack, *.example.yaml) are intentionally excluded.
#
# The application runs as a single workload: the Go server serves the API
# under /api and the built frontend bundle on every other route.
resources:
  - app/pvc.yaml
  - app/deployment.yaml
  - app/service.yaml
