apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-transcript-viewer-backend
  labels:
    app: claude-transcript-viewer-backend
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-transcript-viewer-backend
      tier: backend
  template:
    metadata:
      labels:
        app: claude-transcript-viewer-backend
        tier: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: backend
          image: ghcr.io/dlddu/claude-transcript-viewer-v2/backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: PORT
              value: "3000"
            - name: SQLITE_PATH
              value: "/data/transcripts.db"
          envFrom:
            - secretRef:
                name: claude-transcript-viewer-secrets
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - name: sqlite-data
              mountPath: /data
      volumes:
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: claude-transcript-viewer-sqlite
