apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-transcript-viewer
  labels:
    app: claude-transcript-viewer
spec:
  replicas: 1
  # Single-writer SQLite on a ReadWriteOnce PVC: maxSurge=0 keeps at most one
  # pod during a rollout, so the old pod releases the volume before the new one
  # mounts it (avoids a multi-attach deadlock). Recreate would behave the same
  # but cannot be applied over an existing RollingUpdate Deployment without
  # clearing the defaulted spec.strategy.rollingUpdate, which the API rejects.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: claude-transcript-viewer
  template:
    metadata:
      labels:
        app: claude-transcript-viewer
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: app
          # Single image: the Go server serves the API under /api and the
          # built frontend bundle (baked into the image) on all other routes.
          image: ghcr.io/dlddu/claude-transcript-viewer-v2:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: PORT
              value: "3000"
            - name: DB_PATH
              value: /data/transcripts.db
          envFrom:
            - secretRef:
                name: claude-transcript-viewer-secrets
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: claude-transcript-viewer-data
