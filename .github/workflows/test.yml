name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend unit tests
        run: pnpm --filter @claude-transcript-viewer/frontend test:unit

      - name: Run backend unit tests
        working-directory: backend
        run: go test ./...

      - name: Backend vet
        working-directory: backend
        run: go vet ./...

      - name: Type check
        run: pnpm typecheck

  integration-tests:
    name: Integration Tests with MinIO
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data

      - name: Wait for MinIO to be ready
        run: |
          timeout 60 bash -c 'until curl -fs http://localhost:9000/minio/health/live; do sleep 2; done'

      - name: Create S3 bucket
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          AWS_DEFAULT_REGION: us-east-1
          AWS_ENDPOINT_URL: http://localhost:9000
        run: |
          # Create bucket (integration tests upload their own fixtures at runtime)
          aws --endpoint-url "$AWS_ENDPOINT_URL" s3 mb s3://test-transcripts

      - name: Run integration tests
        working-directory: backend
        env:
          AWS_ENDPOINT_URL: http://localhost:9000
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          AWS_DEFAULT_REGION: us-east-1
        run: go test -tags=integration -v -count=1 ./...

  e2e-tests:
    name: E2E Tests with Playwright
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('e2e/package.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @claude-transcript-viewer/e2e exec playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @claude-transcript-viewer/e2e exec playwright install-deps chromium

      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data

      - name: Wait for MinIO
        run: |
          timeout 60 bash -c 'until curl -fs http://localhost:9000/minio/health/live; do sleep 2; done'

      - name: Create S3 bucket
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          AWS_DEFAULT_REGION: us-east-1
          AWS_ENDPOINT_URL: http://localhost:9000
        run: |
          aws --endpoint-url "$AWS_ENDPOINT_URL" s3 mb s3://test-transcripts

      # No VITE_API_URL: the bundle calls the API on the same origin, and the
      # Go server below serves both the API and these static files.
      - name: Build frontend
        run: pnpm --filter @claude-transcript-viewer/frontend build

      - name: Build backend
        working-directory: backend
        run: go build -o ./server .

      # Upload fixtures to their Hive-partitioned S3 keys and record the
      # session→prefix mapping in the same SQLite DB the server reads from.
      - name: Seed transcripts into S3 and SQLite (Hive layout)
        env:
          AWS_ENDPOINT_URL: http://localhost:9000
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          AWS_DEFAULT_REGION: us-east-1
          S3_BUCKET: test-transcripts
          DB_PATH: ${{ github.workspace }}/backend-e2e.db
        run: ./backend/server seed --dir e2e/fixtures

      - name: Start server (API + static frontend)
        env:
          AWS_ENDPOINT_URL: http://localhost:9000
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          S3_BUCKET: test-transcripts
          DB_PATH: ${{ github.workspace }}/backend-e2e.db
          STATIC_DIR: ${{ github.workspace }}/frontend/dist
        run: |
          ./backend/server &
          timeout 30 bash -c 'until curl -f http://localhost:3000/api/health; do sleep 2; done'
          curl -fs http://localhost:3000/ | grep -q '<!DOCTYPE html>'

      - name: Run E2E tests
        env:
          BASE_URL: http://localhost:3000
        run: pnpm --filter @claude-transcript-viewer/e2e test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30

  workflow-validation-tests:
    name: Workflow File Validation
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Docker Publish Workflow validation tests
        run: node --test e2e/tests/docker-publish-workflow.spec.mjs

  docker-e2e-tests:
    name: Docker Build E2E Tests
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build application Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: claude-transcript-viewer:test
          cache-from: type=gha,scope=docker-e2e-app
          cache-to: type=gha,scope=docker-e2e-app,mode=max

      - name: Test application container
        run: |
          docker run -d --name app-test -p 3001:3000 \
            -e AWS_ACCESS_KEY_ID=test \
            -e AWS_SECRET_ACCESS_KEY=test \
            -e S3_BUCKET=test-bucket \
            claude-transcript-viewer:test
          sleep 5
          curl -f http://localhost:3001/api/health || exit 1
          curl -fs http://localhost:3001/ | grep -q '<!DOCTYPE html>' || exit 1
          curl -fs http://localhost:3001/session/some-client-route | grep -q '<!DOCTYPE html>' || exit 1
          docker stop app-test
          docker rm app-test

      - name: Check image size
        run: |
          app_size=$(docker inspect claude-transcript-viewer:test --format='{{.Size}}')
          app_mb=$((app_size / 1024 / 1024))
          echo "Application image size: ${app_mb}MB"
          if [ $app_mb -gt 300 ]; then
            echo "Warning: Application image size exceeds 300MB"
          fi

      - name: Run Docker build tests
        run: pnpm tsx --test e2e/tests/docker-build.spec.ts

  k8s-manifest-validation:
    name: Kubernetes Manifest Validation
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Run K8s app manifest validation tests
        run: pnpm tsx --test e2e/tests/k8s-manifests.spec.ts

      - name: Run K8s LocalStack manifest validation tests
        run: pnpm tsx --test e2e/tests/k8s-localstack-manifests.spec.ts

  kind-cluster-validation:
    name: Kind Cluster Infrastructure Validation
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Kind workflow validation tests
        run: pnpm tsx --test e2e/tests/kind-cluster-workflow.spec.ts

      - name: Run Kind local script validation tests
        run: pnpm tsx --test e2e/tests/local-kind-script.spec.ts

  kind-e2e-tests:
    name: Kind E2E Tests
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build application Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: claude-transcript-viewer:test
          cache-from: type=gha,scope=kind-app
          cache-to: type=gha,scope=kind-app,mode=max

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: test-cluster
          config: scripts/kind-config.yaml

      - name: Load Docker images into kind
        run: |
          kind load docker-image claude-transcript-viewer:test --name test-cluster
          docker pull --platform linux/arm64 localstack/localstack:3.0
          kind load docker-image localstack/localstack:3.0 --name test-cluster

      - name: Create test ConfigMap and Secret
        run: |
          kubectl create configmap claude-transcript-viewer-config \
            --from-literal=PORT=3000 \
            --from-literal=AWS_REGION=us-east-1 \
            --from-literal=S3_BUCKET=test-transcripts \
            --from-literal=AWS_ENDPOINT_URL=http://localstack:4566

          # Secret (consumed via envFrom in the Deployment)
          kubectl create secret generic claude-transcript-viewer-secrets \
            --from-literal=AWS_ACCESS_KEY_ID=test \
            --from-literal=AWS_SECRET_ACCESS_KEY=test \
            --from-literal=AWS_REGION=us-east-1 \
            --from-literal=S3_BUCKET=test-transcripts \
            --from-literal=AWS_ENDPOINT_URL=http://localstack:4566

      - name: Deploy LocalStack to kind cluster
        run: kubectl apply -f k8s/localstack/

      - name: Deploy application to kind cluster
        run: |
          kubectl apply -f k8s/app/pvc.yaml
          kubectl apply -f k8s/app/deployment.yaml
          kubectl apply -f k8s/app/service.yaml
          kubectl set image deployment/claude-transcript-viewer \
            app=claude-transcript-viewer:test
          kubectl set env deployment/claude-transcript-viewer \
            AWS_ENDPOINT_URL=http://localstack:4566
          kubectl patch deployment claude-transcript-viewer --type=json \
            -p='[{"op": "replace", "path": "/spec/replicas", "value": 1}, {"op": "replace", "path": "/spec/template/spec/containers/0/imagePullPolicy", "value": "IfNotPresent"}]'

      - name: Wait for all deployments to be ready
        run: |
          kubectl rollout status deployment/localstack --timeout=120s
          kubectl rollout status deployment/claude-transcript-viewer --timeout=120s

      # Seed by running the app's own `seed` subcommand inside the pod: it
      # uploads fixtures to their Hive-partitioned keys (in-cluster LocalStack
      # endpoint) and writes the session→prefix mapping to the SQLite DB on
      # the PVC. Restart afterwards so the serving pod reads the freshly
      # seeded database.
      - name: Seed transcripts into LocalStack and SQLite (Hive layout)
        run: |
          kubectl exec deploy/localstack -- awslocal s3 mb s3://test-transcripts
          app_pod=$(kubectl get pod -l app=claude-transcript-viewer -o jsonpath='{.items[0].metadata.name}')
          kubectl cp e2e/fixtures "$app_pod:/tmp/fixtures"
          kubectl exec "$app_pod" -- /usr/local/bin/server seed --dir /tmp/fixtures
          kubectl rollout restart deployment/claude-transcript-viewer
          kubectl rollout status deployment/claude-transcript-viewer --timeout=120s

      - name: Port forward services
        run: |
          kubectl port-forward svc/claude-transcript-viewer 8080:80 &
          kubectl port-forward svc/localstack 4566:4566 &
          sleep 5

      - name: Cache Playwright browsers
        id: playwright-cache-kind
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('e2e/package.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache-kind.outputs.cache-hit != 'true'
        run: pnpm --filter @claude-transcript-viewer/e2e exec playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache-kind.outputs.cache-hit == 'true'
        run: pnpm --filter @claude-transcript-viewer/e2e exec playwright install-deps chromium

      - name: Run E2E tests against kind cluster
        env:
          BASE_URL: http://localhost:8080
        run: pnpm --filter @claude-transcript-viewer/e2e test

      - name: Debug on failure
        if: failure()
        run: |
          kubectl get pods -A
          kubectl describe pods -A
          kubectl logs -l app=localstack --tail=100
          kubectl logs -l app=claude-transcript-viewer --tail=100

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-kind
          path: e2e/playwright-report/
          retention-days: 30

  lint:
    name: Lint
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache ESLint
        uses: actions/cache@v4
        with:
          path: |
            frontend/.eslintcache
          key: eslint-${{ runner.os }}-${{ hashFiles('**/eslint*') }}-${{ github.sha }}
          restore-keys: |
            eslint-${{ runner.os }}-${{ hashFiles('**/eslint*') }}-
            eslint-${{ runner.os }}-

      - name: Run linters
        run: pnpm lint
